[Sources]
local_dirs = /config/sources
online_urls = 
    https://live.zbds.org/tv/iptv4.m3u
    https://raw.githubusercontent.com/YueChan/Live/main/IPTV.m3u
    https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/ipv4/result.m3u
github_sources = 

[Network]
proxy_enabled = false
proxy_type = socks5
proxy_host = 
proxy_port = 1080
proxy_username = 
proxy_password = 
ipv6_enabled = false
ip_version = all
github_mirror_enabled = true
github_mirror_urls = https://ghproxy.com/,https://ghproxy.net/

[HTTPServer]
enabled = true
host = 0.0.0.0
port = 12345
document_root = /www/output

[GitHub]
api_url = https://api.github.com
api_token = 
rate_limit = 5000

[Testing]
timeout = 10
concurrent_threads = 30
cache_ttl = 120
enable_speed_test = true
speed_test_duration = 6
max_retries = 2

[Output]
filename = live.m3u
group_by = category
include_failed = false
max_sources_per_channel = 3
enable_filter = true
output_dir = /www/output

[Logging]
level = INFO
file = /log/app.log
max_size = 10
backup_count = 5

[Filter]
max_latency = 5000
min_bitrate = 100
must_hd = false
must_4k = false
min_speed = 40
min_resolution = 720p
max_resolution = 4k
resolution_filter_mode = range
location = 
isp = 
origin_type_prefer = local,subscribe

[EPG]
update_interval = 12
include_epg_url = true
epg_url = http://localhost:12345/epg.xml
epg_sources = []

[Logo]
remote_base_url = 
local_dir = /config/logos

[Catchup]
days = 7
template = {url}?playseek={start}-{end}

[WebServer]
port = 23456
enable_auth = true
session_timeout = 1440

[RTMP]
open_rtmp = true
nginx_http_port = 8080
nginx_rtmp_port = 1935
rtmp_idle_timeout = 300
rtmp_max_streams = 10
rtmp_transcode_mode = copy

[Scan]
hotel_ip_ranges = []
multicast_interfaces = []

[System]
admin_username = admin
admin_password_hash = 
cron_expression = 0 2 * * *
